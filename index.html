        :root {

            --border: #27272a;
        }

        body { background-color: var(--bg); color: var(--text); font-family: 'Menlo', 'Courier New', monospace; margin: 0; padding: 15px; display: flex; justify-content: center; height: 100vh; box-sizing: border-box; overflow: hidden;}

        .header { text-align: center; margin-bottom: 15px; flex-shrink: 0;}
        .title { font-size: 2.2rem; font-weight: bold; color: var(--text); margin: 0; letter-spacing: 2px;}
        .title span { color: var(--accent); }
        .subtitle { font-size: 0.9rem; font-weight: bold; color: #71717a; margin-top: 2px; letter-spacing: 2px;}

        .top-grid { display: grid; grid-template-columns: 320px 1fr; gap: 15px; margin-bottom: 15px; flex-shrink: 0;}
        .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; flex-grow: 1; min-height: 0; }

        .visual-stage { display: flex; flex-direction: column; align-items: center; position: relative; background-color: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px; box-shadow: 0 4px 20px rgba(0, 255, 65, 0.05);}
        #canvas-container { width: 100%; aspect-ratio: 1/1; background-color: #050505; cursor: grab; border-radius: 6px; border: 1px solid var(--border);}
        #canvas-container:active { cursor: grabbing; }
        #loading-text { position: absolute; top: 45%; color: var(--accent); font-weight: bold; animation: pulse 1.5s infinite; pointer-events: none; text-align: center; line-height: 1.5; width: 100%;}
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .settings-panel { background-color: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 8px; justify-content: center;}
        .settings-header { color: #71717a; font-size: 0.8rem; border-bottom: 1px solid var(--border); padding-bottom: 4px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase;}
        
        .slider-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem;}
        .slider-row label { font-weight: bold; color: var(--text); min-width: 130px;}
        .slider-row span { color: var(--accent); }
        input[type="range"] { flex-grow: 1; margin: 0 10px; cursor: pointer; accent-color: var(--accent); }
        
        select.main-sel { width: 100%; padding: 10px; font-family: 'Menlo', monospace; background-color: #050505; color: var(--accent); border: 1px solid var(--accent); border-radius: 6px; font-size: 0.95rem; cursor: pointer; font-weight: bold; text-align: center; margin-top: 5px;}
        button.btn-exec { width: 100%; padding: 12px; font-family: 'Menlo', monospace; font-size: 1.05rem; font-weight: bold; background-color: var(--accent); color: #000; border: none; border-radius: 6px; cursor: pointer; transition: all 0.2s; margin-top: 5px;}
        button.btn-exec:hover { background-color: #00cc33; transform: translateY(-2px);}

        .output-col { display: flex; flex-direction: column; gap: 10px; min-height: 0;}
        .output-box { background-color: var(--card); border: 1px solid var(--border); padding: 15px; flex-grow: 1; font-size: 1.05rem; line-height: 1.5; border-radius: 8px; color: #fff; overflow-y: auto;}
        
        .btn-row { display: flex; gap: 10px; flex-shrink: 0;}
        .btn-toggle { background-color: rgba(255, 51, 102, 0.1); color: var(--alert); border: 1px solid var(--alert); flex: 1; padding: 10px; font-family: 'Menlo', monospace; font-size: 0.85rem; font-weight: bold; cursor: pointer; border-radius: 6px; transition: all 0.2s;}
        .btn-toggle.active { background-color: rgba(0, 255, 65, 0.1); color: var(--accent); border: 1px solid var(--accent); }
        .btn-copy { background-color: #18181b; color: var(--text); border: 1px solid var(--border); flex: 1; padding: 10px; font-family: 'Menlo', monospace; font-size: 0.85rem; cursor: pointer; border-radius: 6px; transition: all 0.2s;}
        .btn-copy:hover { background-color: #27272a; }

        .log-box { background-color: #050505; border: 1px solid var(--border); padding: 15px; height: 100%; box-sizing: border-box; overflow-y: auto; color: #a1a1aa; border-radius: 8px; font-size: 0.8rem; line-height: 1.4;}
        .log-box strong { color: var(--accent); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

    function init3D() {
        const container = document.getElementById('canvas-container');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000); camera.position.z = 5;
        renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true }); 
        
        const rect = container.getBoundingClientRect();
        renderer.setSize(rect.width, rect.height);
        container.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05; controls.autoRotate = true; controls.autoRotateSpeed = 0.5; controls.enableZoom = true;
        
        scene.add(new THREE.DirectionalLight(0xffffff, 3.0).position.set(2, 2, 5)); 
        scene.add(new THREE.AmbientLight(0x404040, 4.0));

        animate3D(); loadBuiltInModel();
        
        window.addEventListener('resize', () => {
            const newRect = container.getBoundingClientRect();
            renderer.setSize(newRect.width, newRect.height);
            camera.aspect = newRect.width / newRect.height;
            camera.updateProjectionMatrix();
        });
    }

    function animate3D() {
        requestAnimationFrame(animate3D); if (controls) controls.update();
        if (faceMesh) {
            currentMouthValue += (targetMouthValue - currentMouthValue) * 0.3; 
            if (mouthMesh && mouthMorphIndex !== -1) mouthMesh.morphTargetInfluences[mouthMorphIndex] = currentMouthValue;
            else if (isSpeaking) faceMesh.position.y = currentMouthValue * -0.2; 
            else faceMesh.position.y += (0 - faceMesh.position.y) * 0.1; 
        }
        renderer.render(scene, camera);
    }

    function startLipSync() { clearInterval(lipSyncInterval); targetMouthValue = 0; lipSyncInterval = setInterval(() => { targetMouthValue = (Math.random() > 0.3) ? 0.3 + (Math.random() * 0.7) : 0; }, 120); }

                        }

                faceMesh.scale.set(scale, scale, scale); faceMesh.position.set(-center.x * scale, -center.y * scale, -center.z * scale);
                scene.add(faceMesh);
            }, 
            function (xhr) {
                if (xhr.lengthComputable && xhr.total > 0) {
                    const percentComplete = (xhr.loaded / xhr.total) * 100;
                    loadingText.innerText = "MOUNTING: " + Math.round(percentComplete) + "%";
                }

                clearTimeout(timeoutFailsafe);

        let cleanText = text.replace(/[\u{1F600}-\u{1F6FF}\u{1F300}-\u{1F5FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
        let msg = new SpeechSynthesisUtterance(cleanText);
        
        msg.pitch = 0.65; msg.rate = 0.8; 
        
        let voices = window.speechSynthesis.getVoices();
        let eddyVoice = voices.find(v => v.name.includes('Eddy') && v.lang.includes('it'));
        if (eddyVoice) msg.voice = eddyVoice; else msg.voice = voices.find(v => v.lang.includes('it')) || voices[0];

        msg.onstart = () => { isSpeaking = true; startLipSync(); };
        msg.onboundary = () => { targetMouthValue = 0.8 + (Math.random() * 0.2); };
        msg.onend = msg.onerror = () => { isSpeaking = false; stopLipSync(); };
        window.speechSynthesis.speak(msg);
    }

    if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        window.speechSynthesis.getVoices();
    }

    // THE INFINITE CHAIN GENERATOR
    function generatePost() {
        const v = parseInt(document.getElementById("vibeSelector").value);
        const length = Math.round(parseFloat(document.getElementById("lenSlider").value));
        let post = "";
        
        // Convert length 1-10 into number of distinct sentences (1 to 20 sentences)
        let numSentences = length * 2; 

        for (let i = 0; i < numSentences; i++) {
            let sentence = "";
            
            // Start with an opener or core thought
            sentence += rand(Math.random() > 0.5 ? atoms.openers : atoms.core_thoughts);
            
            // Add 1 to 3 core thoughts/escalations linked by connectors
            let chainLength = Math.floor(Math.random() * 3) + 1;
            for(let j=0; j < chainLength; j++) {
                sentence += rand(atoms.connectors) + rand(atoms.core_thoughts);
            }

            // 30% chance to append a closer
            if (Math.random() > 0.7) {
                sentence += rand(atoms.connectors) + rand(atoms.closers);
            }
            
            // Punctuation and spacing
            if (v === 3) sentence = sentence.toUpperCase(); // Caps-lock mode
            sentence += (Math.random() > 0.5 ? " " : ". ");
            post += sentence;
        }

        // Always end with a final closer
        post += rand(atoms.closers);

        // Replace all {vars}
        for (const [key, valArray] of Object.entries(vars)) {
            while(post.includes(key)) {
                post = post.replace(key, rand(valArray));
            }
        }

        // Final Vibe Formatting Chaos
        if (v === 1) post = "Gamarjoba, gtxovt gaecnot: " + post; // Academic
        if (v === 2 && Math.random() > 0.5) post = post.replaceAll(" ", "..."); // Paranoia
        
        if (Math.random() > 0.3) post += rand(atoms.emojis);
        if (Math.random() > 0.7) post = post.replaceAll(",", ",,");
        if (Math.random() > 0.85) post += " Translate";
        
        document.getElementById("output").innerText = post;
        const modeName = document.getElementById("vibeSelector").options[document.getElementById("vibeSelector").selectedIndex].text;
        document.getElementById("logBox").innerHTML = `<strong>[${modeName.split('.')[0]} | LEN ${length}]</strong><br>> ${post}<br><br>` + document.getElementById("logBox").innerHTML;
        
        playTrashyTTS(post);
    }

    function copyText() { 
        navigator.clipboard.writeText(document.getElementById("output").innerText).then(() => {
            const btn = document.getElementById("copyBtn"); const originalText = btn.innerText;
            btn.innerText = "✔️ COPIED!"; btn.style.color = "var(--accent)"; btn.style.borderColor = "var(--accent)";
            setTimeout(() => { btn.innerText = originalText; btn.style.color = "var(--text)"; btn.style.borderColor = "var(--border)"; }, 1500);
        });
    }

    window.onload = init3D;
</script>

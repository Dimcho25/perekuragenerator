        renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true }); renderer.setSize(350, 350);
        container.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05; controls.autoRotate = true; controls.autoRotateSpeed = 0.5; controls.enableZoom = true;
        
        // DOUBLED LIGHTING INTENSITY
        scene.add(new THREE.DirectionalLight(0xffffff, 3.0).position.set(2, 2, 5)); 
        scene.add(new THREE.AmbientLight(0x404040, 4.0));

        animate3D(); loadBuiltInModel();

        requestAnimationFrame(animate3D); if (controls) controls.update();

            else if (isSpeaking) faceMesh.position.y = currentMouthValue * -0.2; 
            else faceMesh.position.y += (0 - faceMesh.position.y) * 0.1; 
        }
        renderer.render(scene, camera);
    }

    // --- UI LOGIC & EDDY LOCK ---
    let audioEnabled = true; let availableVoices = [];

    function populateVoices() { 
        availableVoices = window.speechSynthesis.getVoices(); 
    }
    
    window.speechSynthesis.onvoiceschanged = populateVoices; 
    setTimeout(populateVoices, 100);

    function updateUI() {
        const lenVal = parseFloat(document.getElementById("lenSlider").value);
        let displayLen = Math.round(lenVal);
        let lenLabel = displayLen;
        if(displayLen > 4 && displayLen < 8) lenLabel += " (RANT)";
        if(displayLen >= 8) lenLabel += " (MANIFESTO)";
        document.getElementById("lenDisp").innerText = lenLabel;
        
        const spinVal = parseFloat(document.getElementById("spinSlider").value);
        document.getElementById("spinDisp").innerText = spinVal.toFixed(2);
        if (controls) controls.autoRotateSpeed = spinVal;
    }

    function toggleAudio() {
        audioEnabled = !audioEnabled; const btn = document.getElementById("audioToggle");
        if (audioEnabled) { btn.className = "btn-toggle active"; btn.innerText = "🔊 EDDY PROTOCOL: ON"; } 
        else { btn.className = "btn-toggle"; btn.innerText = "🔇 EDDY PROTOCOL: OFF"; window.speechSynthesis.cancel(); isSpeaking = false; stopLipSync(); }
    }

    function playTrashyTTS(text) {
        if (!audioEnabled || !('speechSynthesis' in window)) return; window.speechSynthesis.cancel(); 
        let cleanText = text.replace(/[\u{1F600}-\u{1F6FF}\u{1F300}-\u{1F5FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
        let msg = new SpeechSynthesisUtterance(cleanText);
        
        // HARDCODED PITCH AND RATE - NO UI REQUIRED
        msg.pitch = 0.65; 
        msg.rate = 0.8; 
        
        // SILENTLY ENFORCE THE EDDY PROTOCOL
        let eddyVoice = availableVoices.find(v => v.name.includes('Eddy'));
        if (eddyVoice) {
            msg.voice = eddyVoice; 
        } else {
            msg.voice = availableVoices.find(v => v.lang.includes('it')) || availableVoices[0];
        }

        msg.onstart = () => { isSpeaking = true; startLipSync(); };
        msg.onboundary = () => { targetMouthValue = 0.8 + (Math.random() * 0.2); };
        msg.onend = msg.onerror = () => { isSpeaking = false; stopLipSync(); };
        window.speechSynthesis.speak(msg);
    }

    function generatePost() {
        const v = document.getElementById("vibeSelector").value;
        const length = Math.round(parseFloat(document.getElementById("lenSlider").value));
        let post = "";

        const vars = { "{a}": rand(lore.allies), "{v}": rand(lore.villains), "{ac}": rand(lore.academics), "{hd}": rand(lore.hoods), "{c}": rand(lore.concepts) };

        let activeVibes = v === "8" ? [1,2,3,4,5,6] : [parseInt(v)];
        let selectedVibe = vibes[rand(activeVibes).toString()];
        
        post += rand(selectedVibe.setups);
        
        for(let i = 1; i < length; i++) {
            let randomComplication = rand(vibes[rand(activeVibes).toString()].comps);
            if(Math.random() > 0.4) post += rand(connectors) + randomComplication;
            else post += rand(connectors) + rand(pureRandoms) + " ";
        }
        
        post += rand(selectedVibe.concs);

        for (const [key, val] of Object.entries(vars)) post = post.replaceAll(key, val);

        if (Math.random() > 0.3) post += rand(lore.emojis);
        if (Math.random() > 0.7) post = post.replaceAll(",", ",,");
        if (Math.random() > 0.85) post += " Translate";
        
        document.getElementById("output").innerText = post;
        const modeName = document.getElementById("vibeSelector").options[document.getElementById("vibeSelector").selectedIndex].text;
        document.getElementById("logBox").innerHTML = `<strong>[${modeName.split('.')[0]} | LEN ${length}]</strong><br>> ${post}<br><br>` + document.getElementById("logBox").innerHTML;
        
        playTrashyTTS(post);
    }

    function copyText() { 
        navigator.clipboard.writeText(document.getElementById("output").innerText).then(() => {
            const btn = document.getElementById("copyBtn"); const originalText = btn.innerText;
            btn.innerText = "✔️ COPIED!"; btn.style.color = "var(--accent)"; btn.style.borderColor = "var(--accent)";
            setTimeout(() => { btn.innerText = originalText; btn.style.color = "var(--text)"; btn.style.borderColor = "var(--border)"; }, 1500);
        });
    }

    // START ENGINE
    window.onload = init3D;
</script>
